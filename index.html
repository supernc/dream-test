<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>梦境人格测试 - 你的梦境人格是？</title>
<meta name="description" content="12道题，解锁你的梦境密码。探索你的梦境人格类型。">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #0a0a2e;
  color: #e0e0ff;
  -webkit-font-smoothing: antialiased;
}

/* ===== Background Stars ===== */
.stars-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--duration) ease-in-out infinite alternate;
  opacity: 0;
}

@keyframes twinkle {
  0% { opacity: 0.1; transform: scale(0.8); }
  100% { opacity: var(--max-opacity); transform: scale(1.2); }
}

/* Floating orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  animation: floatOrb var(--duration) ease-in-out infinite alternate;
  opacity: 0.15;
}

@keyframes floatOrb {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(var(--tx), var(--ty)) scale(1.2); }
}

/* ===== Page Sections ===== */
.page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.6s ease, visibility 0.6s ease;
  padding: 20px;
}

.page.active {
  opacity: 1;
  visibility: visible;
}

/* ===== Welcome Page ===== */
.welcome-content {
  text-align: center;
  animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-icon {
  font-size: 64px;
  margin-bottom: 20px;
  animation: floatIcon 3s ease-in-out infinite;
}

@keyframes floatIcon {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.welcome-title {
  font-size: clamp(28px, 7vw, 42px);
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #f093fb, #764ba2);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 4s ease infinite;
  margin-bottom: 16px;
  line-height: 1.3;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.welcome-subtitle {
  font-size: clamp(14px, 3.5vw, 18px);
  color: rgba(224, 224, 255, 0.7);
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.btn-start {
  display: inline-block;
  padding: 16px 48px;
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  letter-spacing: 2px;
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
}

.btn-start:active {
  transform: translateY(0);
}

.btn-start::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: rotate(45deg);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%) rotate(45deg); }
  100% { transform: translateX(100%) rotate(45deg); }
}

.welcome-hint {
  margin-top: 24px;
  font-size: 13px;
  color: rgba(224, 224, 255, 0.4);
}

/* ===== Quiz Page ===== */
.quiz-header {
  width: 100%;
  max-width: 500px;
  margin-bottom: 32px;
}

.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #f093fb);
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-text {
  text-align: center;
  font-size: 13px;
  color: rgba(224, 224, 255, 0.5);
}

.quiz-card {
  width: 100%;
  max-width: 500px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 32px 24px;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.quiz-card.fade-out {
  opacity: 0;
  transform: translateX(-30px);
}

.quiz-card.fade-in {
  opacity: 0;
  transform: translateX(30px);
}

.quiz-card.fade-in.show {
  opacity: 1;
  transform: translateX(0);
}

.question-number {
  font-size: 13px;
  color: #f093fb;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 12px;
}

.question-text {
  font-size: clamp(18px, 4.5vw, 22px);
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 28px;
  color: #fff;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option-btn {
  width: 100%;
  padding: 16px 20px;
  font-size: 15px;
  line-height: 1.4;
  color: rgba(224, 224, 255, 0.9);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.option-btn:hover {
  background: rgba(102, 126, 234, 0.15);
  border-color: rgba(102, 126, 234, 0.4);
  transform: translateX(4px);
}

.option-btn:active {
  transform: scale(0.98);
}

.option-btn.selected {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
  border-color: #667eea;
  color: #fff;
}

.option-btn.selected::before {
  content: '✓';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: #f093fb;
  font-weight: bold;
}

/* ===== Loading Page ===== */
.loading-content {
  text-align: center;
}

.loading-orb {
  width: 120px;
  height: 120px;
  margin: 0 auto 32px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #f093fb, #667eea, #764ba2);
  animation: pulseOrb 2s ease-in-out infinite, rotateOrb 6s linear infinite;
  box-shadow: 0 0 60px rgba(102, 126, 234, 0.4), 0 0 120px rgba(240, 147, 251, 0.2);
}

@keyframes pulseOrb {
  0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(102, 126, 234, 0.4), 0 0 120px rgba(240, 147, 251, 0.2); }
  50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(102, 126, 234, 0.6), 0 0 160px rgba(240, 147, 251, 0.3); }
}

@keyframes rotateOrb {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

.loading-text {
  font-size: 18px;
  color: rgba(224, 224, 255, 0.8);
  animation: fadeInOut 2s ease-in-out infinite;
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

/* ===== Result Page ===== */
#page-result {
  overflow-y: auto;
  justify-content: flex-start;
  padding-top: 40px;
  padding-bottom: 40px;
}

.result-container {
  width: 100%;
  max-width: 500px;
  animation: fadeInUp 0.8s ease-out;
}

.result-card {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 36px 24px;
  text-align: center;
  margin-bottom: 20px;
}

.result-emoji {
  font-size: 72px;
  margin-bottom: 16px;
  animation: floatIcon 3s ease-in-out infinite;
}

.result-type-code {
  display: inline-block;
  padding: 4px 16px;
  font-size: 13px;
  letter-spacing: 4px;
  color: #f093fb;
  border: 1px solid rgba(240, 147, 251, 0.3);
  border-radius: 20px;
  margin-bottom: 12px;
}

.result-name {
  font-size: clamp(24px, 6vw, 32px);
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #f093fb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
}

.result-desc {
  font-size: 15px;
  line-height: 1.8;
  color: rgba(224, 224, 255, 0.75);
  margin-bottom: 24px;
}

.result-section {
  text-align: left;
  margin-bottom: 20px;
}

.result-section-title {
  font-size: 14px;
  font-weight: 600;
  color: #f093fb;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.result-section-content {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(224, 224, 255, 0.7);
  padding-left: 4px;
}

.result-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.result-tag {
  display: inline-block;
  padding: 4px 12px;
  font-size: 12px;
  background: rgba(102, 126, 234, 0.15);
  border: 1px solid rgba(102, 126, 234, 0.2);
  border-radius: 20px;
  color: rgba(224, 224, 255, 0.8);
}

.result-color-bar {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  margin-top: 8px;
}

.result-partner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 12px;
  margin-top: 8px;
}

.result-partner-emoji {
  font-size: 32px;
}

.result-partner-info {
  flex: 1;
}

.result-partner-name {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}

.result-partner-desc {
  font-size: 12px;
  color: rgba(224, 224, 255, 0.5);
  margin-top: 2px;
}

/* Action buttons */
.result-actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.btn-share, .btn-restart {
  flex: 1;
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 1px;
}

.btn-share {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
}

.btn-share:hover {
  box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
  transform: translateY(-2px);
}

.btn-restart {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: rgba(224, 224, 255, 0.8);
}

.btn-restart:hover {
  background: rgba(255, 255, 255, 0.12);
  transform: translateY(-2px);
}

/* Share card (for html2canvas capture) */
.share-card-wrapper {
  position: fixed;
  top: -9999px;
  left: -9999px;
  z-index: -1;
}

.share-card {
  width: 375px;
  padding: 40px 28px;
  background: linear-gradient(160deg, #0a0a2e 0%, #1a1a4e 40%, #2a1a4e 100%);
  color: #e0e0ff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
}

.share-card-header {
  text-align: center;
  margin-bottom: 24px;
}

.share-card-emoji {
  font-size: 56px;
  display: block;
  margin-bottom: 12px;
}

.share-card-name {
  font-size: 24px;
  font-weight: 800;
  color: #f093fb;
  margin-bottom: 6px;
}

.share-card-code {
  font-size: 13px;
  letter-spacing: 4px;
  color: rgba(224, 224, 255, 0.5);
}

.share-card-desc {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(224, 224, 255, 0.75);
  margin-bottom: 20px;
  text-align: center;
}

.share-card-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}

.share-card-trait {
  padding: 4px 14px;
  font-size: 12px;
  background: rgba(102, 126, 234, 0.2);
  border-radius: 20px;
  color: rgba(224, 224, 255, 0.8);
}

.share-card-divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, #667eea, #f093fb);
  margin: 0 auto 20px;
  border-radius: 1px;
}

.share-card-footer {
  text-align: center;
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.share-card-footer-title {
  font-size: 14px;
  color: rgba(224, 224, 255, 0.6);
  margin-bottom: 4px;
}

.share-card-footer-sub {
  font-size: 11px;
  color: rgba(224, 224, 255, 0.3);
}

/* Toast notification */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 24px;
  background: rgba(102, 126, 234, 0.9);
  backdrop-filter: blur(10px);
  color: #fff;
  font-size: 14px;
  border-radius: 12px;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Responsive adjustments */
@media (max-width: 360px) {
  .quiz-card {
    padding: 24px 16px;
  }
  .result-card {
    padding: 28px 16px;
  }
}
</style>
</head>
<body>

<!-- Stars Background -->
<div class="stars-container" id="starsContainer"></div>

<!-- Page 1: Welcome -->
<div class="page active" id="page-welcome">
  <div class="welcome-content">
    <div class="welcome-icon">🌙</div>
    <h1 class="welcome-title">你的梦境人格是？</h1>
    <p class="welcome-subtitle">12道题，解锁你的梦境密码</p>
    <button class="btn-start" onclick="startQuiz()">开始探索 ✦</button>
    <p class="welcome-hint">大约需要 2 分钟</p>
  </div>
</div>

<!-- Page 2: Quiz -->
<div class="page" id="page-quiz">
  <div class="quiz-header">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">1 / 12</div>
  </div>
  <div class="quiz-card" id="quizCard">
    <div class="question-number" id="questionNumber">QUESTION 01</div>
    <div class="question-text" id="questionText">Loading...</div>
    <div class="options-list" id="optionsList"></div>
  </div>
</div>

<!-- Page 3: Loading -->
<div class="page" id="page-loading">
  <div class="loading-content">
    <div class="loading-orb"></div>
    <p class="loading-text">正在解析你的梦境<span class="loading-dots"></span></p>
  </div>
</div>

<!-- Page 4: Result -->
<div class="page" id="page-result">
  <div class="result-container">
    <div class="result-card" id="resultCard">
      <div class="result-emoji" id="resultEmoji">🌙</div>
      <div class="result-type-code" id="resultTypeCode">----</div>
      <h2 class="result-name" id="resultName">加载中...</h2>
      <p class="result-desc" id="resultDesc"></p>

      <div class="result-section">
        <div class="result-section-title">🌌 梦境特征</div>
        <div class="result-section-content" id="resultTraits"></div>
      </div>

      <div class="result-section">
        <div class="result-section-title">💡 觉醒建议</div>
        <div class="result-section-content" id="resultAdvice"></div>
      </div>

      <div class="result-section">
        <div class="result-section-title">🎨 代表色</div>
        <div class="result-color-bar" id="resultColorBar"></div>
        <div class="result-section-content" id="resultColorName" style="margin-top:8px;"></div>
      </div>

      <div class="result-section">
        <div class="result-section-title">🤝 最佳梦境搭档</div>
        <div class="result-partner" id="resultPartner">
          <div class="result-partner-emoji" id="partnerEmoji">🌙</div>
          <div class="result-partner-info">
            <div class="result-partner-name" id="partnerName">---</div>
            <div class="result-partner-desc" id="partnerDesc">---</div>
          </div>
        </div>
      </div>

      <div class="result-section">
        <div class="result-section-title">🏷️ 标签</div>
        <div class="result-tags" id="resultTagsContainer"></div>
      </div>
    </div>

    <div class="result-actions">
      <button class="btn-share" onclick="generateShareCard()">📸 生成分享卡片</button>
      <button class="btn-restart" onclick="restartQuiz()">🔄 重新测试</button>
    </div>
  </div>
</div>

<!-- Share Card (offscreen, for html2canvas) -->
<div class="share-card-wrapper" id="shareCardWrapper">
  <div class="share-card" id="shareCard">
    <div class="share-card-header">
      <span class="share-card-emoji" id="shareEmoji">🌙</span>
      <div class="share-card-name" id="shareName">---</div>
      <div class="share-card-code" id="shareCode">----</div>
    </div>
    <div class="share-card-desc" id="shareDesc"></div>
    <div class="share-card-traits" id="shareTraits"></div>
    <div class="share-card-divider"></div>
    <div class="share-card-footer">
      <div class="share-card-footer-title">🌙 梦境人格测试</div>
      <div class="share-card-footer-sub">扫码测测你的梦境人格</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const quizData = {
  questions: [
    {
      id: 1, text: "早上醒来，你对昨晚的梦还记得多少？",
      options: [
        { text: "画面清晰得像刚看完一部电影，连细节都记得", scores: { xu_shi: -1, ming_an: 1, du_qun: 0, kong_sui: 1 } },
        { text: "只剩下一种模糊的感觉，像雾里看花", scores: { xu_shi: 1, ming_an: -1, du_qun: 1, kong_sui: -1 } },
        { text: "记得几个关键片段，像拼图少了几块", scores: { xu_shi: 0, ming_an: 0, du_qun: -1, kong_sui: 1 } },
        { text: "几乎不记得，但醒来时心情会被影响", scores: { xu_shi: 1, ming_an: -1, du_qun: 0, kong_sui: -2 } }
      ]
    },
    {
      id: 2, text: "你大概多久会做一次印象深刻的梦？",
      options: [
        { text: "几乎每天都有，我的夜晚比白天还精彩", scores: { xu_shi: 1, ming_an: 1, du_qun: 0, kong_sui: 1 } },
        { text: "一周几次吧，偶尔有大片级别的", scores: { xu_shi: 0, ming_an: 1, du_qun: -1, kong_sui: 0 } },
        { text: "不太频繁，但一做就是那种特别离谱的", scores: { xu_shi: 2, ming_an: 0, du_qun: 1, kong_sui: -1 } },
        { text: "很少做梦，或者说很少记得", scores: { xu_shi: -1, ming_an: -1, du_qun: 0, kong_sui: -1 } }
      ]
    },
    {
      id: 3, text: "你的梦境场景通常是什么样的？",
      options: [
        { text: "完全架空的奇幻世界——会飞的鲸鱼、倒悬的城市", scores: { xu_shi: 2, ming_an: 1, du_qun: 1, kong_sui: 0 } },

// ===== STATE =====
let currentQuestion = 0;
let scores = { xu_shi: 0, ming_an: 0, du_qun: 0, kong_sui: 0 };
let isTransitioning = false;

// ===== INIT BACKGROUND =====
function initStars() {
  const container = document.getElementById('starsContainer');
  // Create stars
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --duration: ${Math.random() * 3 + 2}s;
      --max-opacity: ${Math.random() * 0.6 + 0.2};
      animation-delay: ${Math.random() * 3}s;
    `;
    container.appendChild(star);
  }
  // Create floating orbs
  const orbColors = ['rgba(102,126,234,0.3)', 'rgba(118,75,162,0.3)', 'rgba(240,147,251,0.2)'];
  for (let i = 0; i < 3; i++) {
    const orb = document.createElement('div');
    orb.className = 'orb';
    const size = Math.random() * 200 + 100;
    orb.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      background: ${orbColors[i]};
      left: ${Math.random() * 80}%;
      top: ${Math.random() * 80}%;
      --duration: ${Math.random() * 8 + 6}s;
      --tx: ${(Math.random() - 0.5) * 100}px;
      --ty: ${(Math.random() - 0.5) * 100}px;
      animation-delay: ${Math.random() * 4}s;
    `;
    container.appendChild(orb);
  }
}

// ===== PAGE NAVIGATION =====
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// ===== QUIZ LOGIC =====
function startQuiz() {
  currentQuestion = 0;
  scores = { xu_shi: 0, ming_an: 0, du_qun: 0, kong_sui: 0 };
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = quizData.questions[currentQuestion];
  const total = quizData.questions.length;

  document.getElementById('progressFill').style.width = `${((currentQuestion) / total) * 100}%`;
  document.getElementById('progressText').textContent = `${currentQuestion + 1} / ${total}`;
  document.getElementById('questionNumber').textContent = `QUESTION ${String(currentQuestion + 1).padStart(2, '0')}`;
  document.getElementById('questionText').textContent = q.text;

  const optionsList = document.getElementById('optionsList');
  optionsList.innerHTML = '';

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(idx);
    optionsList.appendChild(btn);
  });
}

function selectOption(idx) {
  if (isTransitioning) return;
  isTransitioning = true;

  const q = quizData.questions[currentQuestion];
  const optScores = q.options[idx].scores;

  // Add scores
  Object.keys(optScores).forEach(dim => {
    scores[dim] += optScores[dim];
  });

  // Visual feedback
  const buttons = document.querySelectorAll('.option-btn');
  buttons[idx].classList.add('selected');

  // Progress bar
  const total = quizData.questions.length;
  document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / total) * 100}%`;

  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion >= quizData.questions.length) {
      showLoading();
    } else {
      transitionToNextQuestion();
    }
  }, 400);
}

function transitionToNextQuestion() {
  const card = document.getElementById('quizCard');
  card.classList.add('fade-out');

  setTimeout(() => {
    card.classList.remove('fade-out');
    card.classList.add('fade-in');
    renderQuestion();

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.classList.add('show');
        setTimeout(() => {
          card.classList.remove('fade-in', 'show');
          isTransitioning = false;
        }, 400);
      });
    });
  }, 300);
}

function showLoading() {
  showPage('page-loading');
  setTimeout(() => {
    calculateResult();
  }, 2500);
}

function calculateResult() {
  const dims = quizData.dimensions;
  let code = '';
  Object.keys(dims).forEach(dim => {
    code += scores[dim] > 0 ? dims[dim].positive : dims[dim].negative;
  });

  const result = quizData.results[code];
  if (result) {
    displayResult(code, result);
  } else {
    // Fallback: find first available result
    const firstKey = Object.keys(quizData.results)[0];
    displayResult(firstKey, quizData.results[firstKey]);
  }
}

function displayResult(code, result) {
  document.getElementById('resultEmoji').textContent = result.emoji;
  document.getElementById('resultTypeCode').textContent = code;
  document.getElementById('resultName').textContent = result.name;
  document.getElementById('resultDesc').textContent = result.description;
  document.getElementById('resultTraits').textContent = result.traits;
  document.getElementById('resultAdvice').textContent = result.advice;

  // Color
  if (result.color) {
    document.getElementById('resultColorBar').style.background = `linear-gradient(90deg, ${result.color.hex}, ${adjustColor(result.color.hex, 40)})`;
    document.getElementById('resultColorName').textContent = result.color.name;
  }

  // Partner
  if (result.partner) {
    document.getElementById('partnerEmoji').textContent = result.partner.emoji;
    document.getElementById('partnerName').textContent = result.partner.name;
    document.getElementById('partnerDesc').textContent = result.partner.reason;
  }

  // Tags
  const tagsContainer = document.getElementById('resultTagsContainer');
  tagsContainer.innerHTML = '';
  if (result.tags) {
    result.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'result-tag';
      span.textContent = tag;
      tagsContainer.appendChild(span);
    });
  }

  // Setup share card data
  setupShareCard(code, result);

  showPage('page-result');
}

function setupShareCard(code, result) {
  document.getElementById('shareEmoji').textContent = result.emoji;
  document.getElementById('shareName').textContent = result.name;
  document.getElementById('shareCode').textContent = code;
  document.getElementById('shareDesc').textContent = result.description;

  const traitsContainer = document.getElementById('shareTraits');
  traitsContainer.innerHTML = '';
  if (result.tags) {
    result.tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'share-card-trait';
      span.textContent = tag;
      traitsContainer.appendChild(span);
    });
  }
}

// ===== SHARE =====
function generateShareCard() {
  const wrapper = document.getElementById('shareCardWrapper');
  wrapper.style.position = 'fixed';
  wrapper.style.top = '0';
  wrapper.style.left = '0';

  html2canvas(document.getElementById('shareCard'), {
    backgroundColor: '#0a0a2e',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(canvas => {
    wrapper.style.position = 'fixed';
    wrapper.style.top = '-9999px';
    wrapper.style.left = '-9999px';

    canvas.toBlob(blob => {
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], 'dream-result.png', { type: 'image/png' })] })) {
        const file = new File([blob], 'dream-result.png', { type: 'image/png' });
        navigator.share({ files: [file], title: '梦境人格测试结果' }).catch(() => {
          downloadImage(canvas);
        });
      } else {
        downloadImage(canvas);
      }
    }, 'image/png');
  }).catch(() => {
    wrapper.style.position = 'fixed';
    wrapper.style.top = '-9999px';
    wrapper.style.left = '-9999px';
    showToast('生成失败，请重试');
  });
}

function downloadImage(canvas) {
  const link = document.createElement('a');
  link.download = 'dream-personality.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('卡片已保存 ✨');
}

function restartQuiz() {
  currentQuestion = 0;
  scores = { xu_shi: 0, ming_an: 0, du_qun: 0, kong_sui: 0 };
  isTransitioning = false;
  showPage('page-welcome');
}

// ===== UTILS =====
function adjustColor(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  initStars();
});
