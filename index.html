<!DOCTYPE html>
<html lang="zh-CN">
<head>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Helvetica Neue',Helvetica,Arial,sans-serif;background:#0a0a2e;color:#e0e0ff;-webkit-font-smoothing:antialiased}
.stars-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--duration) ease-in-out infinite alternate;opacity:0}
@keyframes twinkle{0%{opacity:.1;transform:scale(.8)}100%{opacity:var(--max-opacity);transform:scale(1.2)}}
.orb{position:absolute;border-radius:50%;filter:blur(40px);animation:floatOrb var(--duration) ease-in-out infinite alternate;opacity:.15}
@keyframes floatOrb{0%{transform:translate(0,0) scale(1)}100%{transform:translate(var(--tx),var(--ty)) scale(1.2)}}
.page{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;opacity:0;visibility:hidden;transition:opacity .6s ease,visibility .6s ease;padding:20px}
.page.active{opacity:1;visibility:visible}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.welcome-content{text-align:center;animation:fadeInUp 1s ease-out}
.welcome-moon{font-size:80px;margin-bottom:24px;animation:floatIcon 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(240,147,251,.4))}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.welcome-title{font-size:clamp(28px,7vw,44px);font-weight:800;background:linear-gradient(135deg,#667eea,#f093fb,#764ba2);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease infinite;margin-bottom:16px;line-height:1.3}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.welcome-subtitle{font-size:clamp(14px,3.5vw,18px);color:rgba(224,224,255,.65);margin-bottom:12px;letter-spacing:2px}
.welcome-stats{display:flex;gap:20px;justify-content:center;margin-bottom:36px;font-size:13px;color:rgba(224,224,255,.45)}
.welcome-stats span{display:flex;align-items:center;gap:4px}
.btn-start{display:inline-block;padding:16px 52px;font-size:18px;font-weight:600;color:#fff;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;border-radius:50px;cursor:pointer;position:relative;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease;letter-spacing:2px}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(102,126,234,.4)}
.btn-start:active{transform:translateY(0)}
.btn-start::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.1),transparent);transform:rotate(45deg);animation:shimmer 3s infinite}
@keyframes shimmer{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
.welcome-hint{margin-top:24px;font-size:13px;color:rgba(224,224,255,.35)}
/* Quiz */
.quiz-header{width:100%;max-width:520px;margin-bottom:28px;display:flex;align-items:center;gap:12px}
.btn-back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(224,224,255,.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease;flex-shrink:0}
.btn-back:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-back:disabled{opacity:.3;cursor:not-allowed}
.quiz-progress-wrap{flex:1}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#f093fb);border-radius:2px;transition:width .5s ease;width:0%}
.progress-text{text-align:center;font-size:13px;color:rgba(224,224,255,.5)}
.quiz-card{width:100%;max-width:520px;background:rgba(255,255,255,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 24px;transition:opacity .4s ease,transform .4s ease}
.quiz-card.fade-out{opacity:0;transform:translateX(-30px)}
.quiz-card.fade-in{opacity:0;transform:translateX(30px)}
.quiz-card.fade-in.show{opacity:1;transform:translateX(0)}
.question-number{font-size:13px;color:#f093fb;text-transform:uppercase;letter-spacing:3px;margin-bottom:12px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;line-height:1.5;margin-bottom:28px;color:#fff}

.option-btn{width:100%;padding:16px 20px;font-size:15px;line-height:1.4;color:rgba(224,224,255,.9);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer;text-align:left;transition:all .3s ease;position:relative;overflow:hidden}

/* Loading */
.loading-content{text-align:center}
.loading-orb{width:120px;height:120px;margin:0 auto 32px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f093fb,#667eea,#764ba2);animation:pulseOrb 2s ease-in-out infinite,rotateOrb 6s linear infinite;box-shadow:0 0 60px rgba(102,126,234,.4),0 0 120px rgba(240,147,251,.2)}
@keyframes pulseOrb{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes rotateOrb{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

/* Result */
#page-result{overflow-y:auto;justify-content:flex-start;padding-top:40px;padding-bottom:60px}
.result-container{width:100%;max-width:520px;animation:fadeInUp .8s ease-out}
.result-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:36px 24px;text-align:center;margin-bottom:16px}
.result-emoji{font-size:72px;margin-bottom:12px;animation:floatIcon 3s ease-in-out infinite}
.result-type-code{display:inline-block;padding:4px 16px;font-size:14px;letter-spacing:4px;color:#f093fb;border:1px solid rgba(240,147,251,.3);border-radius:20px;margin-bottom:8px;font-weight:600}
.result-name{font-size:clamp(26px,6vw,34px);font-weight:800;background:linear-gradient(135deg,#667eea,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.result-slogan{font-size:15px;color:rgba(224,224,255,.6);margin-bottom:20px;font-style:italic}
/* Match ring */
.match-ring-wrap{margin:0 auto 24px;position:relative;width:120px;height:120px}
.match-ring-svg{transform:rotate(-90deg)}
.match-ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:8}
.match-ring-fill{fill:none;stroke:url(#matchGrad);stroke-width:8;stroke-linecap:round;stroke-dasharray:339.292;stroke-dashoffset:339.292;transition:stroke-dashoffset 1.5s ease-out}
.match-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:800;color:#fff}
.match-pct small{font-size:14px;font-weight:400;color:rgba(224,224,255,.5)}
.match-label{font-size:13px;color:rgba(224,224,255,.45);margin-top:-8px;margin-bottom:20px}
/* Sections */
.result-section{text-align:left;margin-bottom:20px;background:rgba(255,255,255,.03);border-radius:16px;padding:20px}
.result-section-title{font-size:14px;font-weight:600;color:#f093fb;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.result-section-content{font-size:14px;line-height:1.8;color:rgba(224,224,255,.7)}
.result-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tag-strength{display:inline-block;padding:5px 14px;font-size:12px;background:rgba(0,206,201,.15);border:1px solid rgba(0,206,201,.25);border-radius:20px;color:#00cec9}
.tag-weakness{display:inline-block;padding:5px 14px;font-size:12px;background:rgba(253,121,168,.12);border:1px solid rgba(253,121,168,.2);border-radius:20px;color:#fd79a8}
/* Dimension bars */
.dim-group{margin-bottom:16px}
.dim-group-title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dim-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dim-label{font-size:12px;color:rgba(224,224,255,.6);width:72px;text-align:right;flex-shrink:0}
.dim-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.dim-bar{height:100%;border-radius:4px;transition:width 1s ease-out}
.dim-level{font-size:11px;width:20px;font-weight:600;flex-shrink:0}
/* Partner */
.result-partner{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.04);border-radius:12px;margin-top:8px}
.result-partner-emoji{font-size:36px}
.result-partner-info{flex:1}
.result-partner-name{font-size:15px;font-weight:600;color:#fff}
.result-partner-reason{font-size:12px;color:rgba(224,224,255,.5);margin-top:3px;line-height:1.5}
/* Actions */
.result-actions{display:flex;gap:12px;margin-top:8px}
.btn-share,.btn-restart{flex:1;padding:14px 20px;font-size:15px;font-weight:600;border:none;border-radius:14px;cursor:pointer;transition:all .3s ease;letter-spacing:1px}
.btn-share{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff}
.btn-share:hover{box-shadow:0 8px 30px rgba(102,126,234,.4);transform:translateY(-2px)}
.btn-restart{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(224,224,255,.8)}
.btn-restart:hover{background:rgba(255,255,255,.12);transform:translateY(-2px)}
/* Share card */
.share-card-wrapper{position:fixed;top:-9999px;left:-9999px;z-index:-1}
.share-card{width:375px;padding:40px 28px;color:#e0e0ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
.share-card-emoji{font-size:56px;display:block;margin-bottom:10px;text-align:center}
.share-card-name{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.share-card-code{font-size:13px;letter-spacing:4px;color:rgba(224,224,255,.5);text-align:center;margin-bottom:6px}
.share-card-slogan{font-size:13px;color:rgba(224,224,255,.55);text-align:center;font-style:italic;margin-bottom:16px}
.share-card-match{text-align:center;font-size:28px;font-weight:800;margin-bottom:16px}
.share-card-match small{font-size:14px;font-weight:400;color:rgba(224,224,255,.5)}
.share-card-traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.share-card-trait{padding:4px 14px;font-size:12px;background:rgba(102,126,234,.2);border-radius:20px;color:rgba(224,224,255,.8)}
.share-card-divider{width:40px;height:2px;background:linear-gradient(90deg,#667eea,#f093fb);margin:0 auto 20px;border-radius:1px}
.share-card-footer{text-align:center;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.share-card-footer-title{font-size:14px;color:rgba(224,224,255,.6);margin-bottom:4px}
.share-card-footer-sub{font-size:11px;color:rgba(224,224,255,.3)}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 24px;background:rgba(102,126,234,.9);backdrop-filter:blur(10px);color:#fff;font-size:14px;border-radius:12px;z-index:1000;opacity:0;transition:all .3s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:360px){.quiz-card{padding:24px 16px}.result-card{padding:28px 16px}.result-section{padding:16px}}
</style>
</head>
<body>
<div class="stars-container" id="starsContainer"></div>

<!-- Page 1: Welcome -->
<div class="page active" id="page-welcome">
  <div class="welcome-content">
    <div class="welcome-moon">🌙</div>
    <h1 class="welcome-title">你的梦境人格是？</h1>

    <div class="welcome-stats">
      <span>🧠 深度分析</span>
      <span>📊 维度雷达</span>

</div>

<!-- Page 2: Quiz -->

    <div class="quiz-progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">1 / 25</div>

    <div class="question-number" id="questionNumber">QUESTION 01</div>

</div>

<!-- Page 3: Loading -->
<div class="page" id="page-loading">
  <div class="loading-content">
    <div class="loading-orb"></div>
    <p class="loading-text" id="loadingText">正在扫描你的梦境数据库...</p>

</div>

<!-- Page 4: Result -->
<div class="page" id="page-result">
  <div class="result-container">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji">🌙</div>
      <div class="result-type-code" id="resultTypeCode">-----</div>
      <h2 class="result-name" id="resultName">加载中...</h2>
      <div class="result-slogan" id="resultSlogan"></div>
      <svg class="match-ring-svg" width="120" height="120" viewBox="0 0 120 120" style="display:block;margin:0 auto">
        <defs><linearGradient id="matchGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#667eea"/><stop offset="100%" stop-color="#f093fb"/></linearGradient></defs>

    <div class="result-section">
      <div class="result-section-title">🌌 梦境特征</div>

    <div class="result-section">

      <div class="result-section-title">💡 觉醒建议</div>

        <div class="result-partner-emoji" id="partnerEmoji">🌙</div>
        <div class="result-partner-info">

<!-- Share Card -->
<div class="share-card-wrapper" id="shareCardWrapper">
  <div class="share-card" id="shareCard">

    <div class="share-card-divider"></div>
    <div class="share-card-footer">
      <div class="share-card-footer-title">🌙 梦境人格测试 | 测测你的梦境人格</div>

<div class="toast" id="toast"></div>

<script>
// ===== PLACEHOLDER DATA (will be replaced by content-v2.json) =====
let DATA = null;

// 15 dimensions grouped in 5 models
const DIMENSION_GROUPS = [
  { name: '梦境深度', color: '#667eea', dims: ['D1','D2','D3'], labels: ['沉浸度','记忆清晰度','层次感'] },
  { name: '情感色彩', color: '#f093fb', dims: ['E1','E2','E3'], labels: ['情绪强度','情感倾向','共情深度'] },
  { name: '意志力量', color: '#00cec9', dims: ['W1','W2','W3'], labels: ['控制力','决断力','坚韧度'] },
  { name: '社交图谱', color: '#fdcb6e', dims: ['S1','S2','S3'], labels: ['角色数量','关系深度','互动方式'] },
  { name: '想象维度', color: '#fd79a8', dims: ['I1','I2','I3'], labels: ['场景创造','逻辑扭曲','感官丰富度'] }
];
const ALL_DIMS = DIMENSION_GROUPS.flatMap(g => g.dims);

// Placeholder questions (25 questions, 3 options each)
const PLACEHOLDER_QUESTIONS = [];
for (let i = 1; i <= 25; i++) {
  const scores = {};
  ALL_DIMS.forEach(d => scores[d] = 0);
  PLACEHOLDER_QUESTIONS.push({
    id: i, text: `占位题目 ${i}：这是一道关于梦境的测试题？`,
    options: [
      { text: `选项A - 第${i}题`, scores: {...scores} },
      { text: `选项B - 第${i}题`, scores: {...scores} },
      { text: `选项C - 第${i}题`, scores: {...scores} }
    ]
  });
}

// Placeholder personalities
const PLACEHOLDER_PERSONALITIES = [{
  code: 'LUCID', name: '清醒梦者', emoji: '🌟',
  slogan: '在梦与醒之间自由穿行',
  description: '你拥有极强的梦境意识，能在梦中保持清醒并主导剧情走向。你的潜意识是一个永不关机的创意引擎。',
  dreamFeature: '经常梦到飞行、太空、未知星球，画面感极强，常能在梦中意识到自己在做梦。',
  strengths: ['清醒梦体质','创意引擎','梦境导演'],
  weaknesses: ['过度思考','难以放松'],
  advice: '你的梦是灵感宝库，醒来先录一段语音备忘。学会在梦中放手，让潜意识自由流动。',
  partner: { code: 'DRIFT', name: '漂流旅人', emoji: '🌊', reason: '你的清醒与TA的随性完美互补' },
  gradient: ['#667eea','#764ba2'],
  pattern: {}
}];

// ===== STATE =====
let currentQuestion = 0;
let answers = [];
let dimScores = {};
let isTransitioning = false;
let currentResult = null;
let currentMatchPct = 0;

// ===== LOAD DATA =====
async function loadData() {
  try {
    const resp = await fetch('content-v2.json');
    if (resp.ok) {
      DATA = await resp.json();
      return true;
    }
  } catch(e) {}
  return false;
}

function getQuestions() {
  return DATA ? DATA.questions : PLACEHOLDER_QUESTIONS;
}
function getPersonalities() {
  return DATA ? DATA.types : PLACEHOLDER_PERSONALITIES;
}
function getDimensionGroups() {
  if (!DATA || !DATA.dimensions) return DIMENSION_GROUPS;
  // Build groups from flat dimensions list by model
  const modelMap = {};
  const modelColors = {'梦境感知':'#667eea','梦境情绪':'#f093fb','梦境世界':'#00cec9','梦中自我':'#fdcb6e','梦境洞察':'#fd79a8'};
  DATA.dimensions.forEach(d => {
    if (!modelMap[d.model]) modelMap[d.model] = { name: d.model, color: modelColors[d.model] || '#667eea', dims: [], labels: [] };
    modelMap[d.model].dims.push(d.id);
    modelMap[d.model].labels.push(d.name);
  });
  return Object.values(modelMap);
}
function findTypeByCode(code) {
  const types = getPersonalities();
  return types.find(t => t.code === code);
}

// ===== INIT =====
function initStars() {
  const c = document.getElementById('starsContainer');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;--max-opacity:${Math.random()*.6+.2};animation-delay:${Math.random()*3}s`;
    c.appendChild(s);
  }
  const colors = ['rgba(102,126,234,.3)','rgba(118,75,162,.3)','rgba(240,147,251,.2)'];
  for (let i = 0; i < 3; i++) {
    const o = document.createElement('div');
    o.className = 'orb';
    const sz = Math.random() * 200 + 100;
    o.style.cssText = `width:${sz}px;height:${sz}px;background:${colors[i]};left:${Math.random()*80}%;top:${Math.random()*80}%;--duration:${Math.random()*8+6}s;--tx:${(Math.random()-.5)*100}px;--ty:${(Math.random()-.5)*100}px;animation-delay:${Math.random()*4}s`;
    c.appendChild(o);
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== QUIZ =====
function startQuiz() {
  currentQuestion = 0;
  answers = [];
  dimScores = {};
  ALL_DIMS.forEach(d => dimScores[d] = 0);
  isTransitioning = false;
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion() {
  const qs = getQuestions();
  const q = qs[currentQuestion];
  const total = qs.length;
  document.getElementById('progressFill').style.width = `${(currentQuestion/total)*100}%`;
  document.getElementById('progressText').textContent = `${currentQuestion+1} / ${total}`;
  document.getElementById('questionNumber').textContent = `QUESTION ${String(currentQuestion+1).padStart(2,'0')}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('btnBack').disabled = currentQuestion === 0;
  const ol = document.getElementById('optionsList');
  ol.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(idx);
    ol.appendChild(btn);
  });
}

function selectOption(idx) {
  if (isTransitioning) return;
  isTransitioning = true;
  const qs = getQuestions();
  const q = qs[currentQuestion];
  const optScores = q.options[idx].scores;
  // Store answer
  answers[currentQuestion] = idx;
  // Add scores
  Object.keys(optScores).forEach(d => { dimScores[d] = (dimScores[d]||0) + optScores[d]; });
  // Visual feedback
  document.querySelectorAll('.option-btn')[idx].classList.add('selected');
  const total = qs.length;
  document.getElementById('progressFill').style.width = `${((currentQuestion+1)/total)*100}%`;
  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion >= qs.length) { showLoading(); }
    else { transitionNext(); }
  }, 450);
}

function goBack() {
  if (currentQuestion <= 0 || isTransitioning) return;
  isTransitioning = true;
  // Undo last answer scores
  const qs = getQuestions();
  const prevIdx = answers[currentQuestion - 1];
  if (prevIdx !== undefined) {
    const prevScores = qs[currentQuestion-1].options[prevIdx].scores;
    Object.keys(prevScores).forEach(d => { dimScores[d] -= prevScores[d]; });
  }
  currentQuestion--;
  answers.length = currentQuestion;
  const card = document.getElementById('quizCard');
  card.classList.add('fade-out');
  setTimeout(() => {
    card.classList.remove('fade-out');
    card.classList.add('fade-in');
    renderQuestion();
    requestAnimationFrame(() => { requestAnimationFrame(() => {
      card.classList.add('show');
      setTimeout(() => { card.classList.remove('fade-in','show'); isTransitioning = false; }, 400);
    }); });
  }, 300);
}

function transitionNext() {
  const card = document.getElementById('quizCard');
  card.classList.add('fade-out');
  setTimeout(() => {
    card.classList.remove('fade-out');
    card.classList.add('fade-in');
    renderQuestion();
    requestAnimationFrame(() => { requestAnimationFrame(() => {
      card.classList.add('show');
      setTimeout(() => { card.classList.remove('fade-in','show'); isTransitioning = false; }, 400);
    }); });
  }, 300);
}

// ===== LOADING =====
function showLoading() {
  showPage('page-loading');
  const texts = ['正在扫描你的梦境数据库...','匹配梦境人格模型...','生成你的专属分析报告...'];
  const el = document.getElementById('loadingText');
  let i = 0;
  el.textContent = texts[0];
  const iv = setInterval(() => {
    i++;
    if (i < texts.length) {
      el.classList.add('fade');
      setTimeout(() => { el.textContent = texts[i]; el.classList.remove('fade'); }, 400);
    }
  }, 1200);
  setTimeout(() => { clearInterval(iv); calculateResult(); }, 3800);
}

// ===== CALCULATE =====
function calculateResult() {
  // Determine H/M/L for each dimension
  const levels = {};
  ALL_DIMS.forEach(d => {
    const v = dimScores[d] || 0;
    levels[d] = v > 3 ? 'H' : (v < -3 ? 'L' : 'M');
  });

  // Find best matching personality
  const personalities = getPersonalities();
  let bestMatch = personalities[0];
  let bestScore = -1;
  let bestExtreme = -1;

  personalities.forEach(p => {
    if (!p.pattern) return;
    let matched = 0;
    let extremeMatched = 0;
    ALL_DIMS.forEach(d => {
      if (p.pattern[d] === levels[d]) {
        matched++;
        if (levels[d] === 'H' || levels[d] === 'L') extremeMatched++;
      }
    });
    const score = matched / ALL_DIMS.length;
    if (score > bestScore || (score === bestScore && extremeMatched > bestExtreme)) {
      bestScore = score;
      bestMatch = p;
      bestExtreme = extremeMatched;
    }
  });

  currentMatchPct = Math.round(bestScore * 100);
  if (currentMatchPct < 40) currentMatchPct = Math.floor(Math.random() * 20) + 60;
  currentResult = bestMatch;
  displayResult(bestMatch, currentMatchPct, levels);
}

function displayResult(p, matchPct, levels) {
  document.getElementById('resultEmoji').textContent = p.emoji;
  document.getElementById('resultTypeCode').textContent = p.code;
  document.getElementById('resultName').textContent = p.name;
  document.getElementById('resultSlogan').textContent = p.slogan || '';
  document.getElementById('resultDesc').textContent = p.description;
  document.getElementById('resultTraits').textContent = p.dream_feature || p.dreamFeature || '';
  document.getElementById('resultAdvice').textContent = p.advice;

  // Use gradient color for name if available
  if (p.gradient) {
    document.getElementById('resultName').style.background = `linear-gradient(135deg, ${p.gradient[0]}, ${p.gradient[1]})`;
    document.getElementById('resultName').style.webkitBackgroundClip = 'text';
    document.getElementById('resultName').style.webkitTextFillColor = 'transparent';
    document.getElementById('resultName').style.backgroundClip = 'text';
  }

  // Strengths & weaknesses
  const sEl = document.getElementById('resultStrengths');
  sEl.innerHTML = '';
  (p.strengths || []).forEach(t => { const s = document.createElement('span'); s.className='tag-strength'; s.textContent=t; sEl.appendChild(s); });
  const wEl = document.getElementById('resultWeaknesses');
  wEl.innerHTML = '';
  (p.weaknesses || []).forEach(t => { const s = document.createElement('span'); s.className='tag-weakness'; s.textContent=t; wEl.appendChild(s); });

  // Partner - handle both formats
  if (p.partner) {
    document.getElementById('partnerEmoji').textContent = p.partner.emoji;
    document.getElementById('partnerName').textContent = p.partner.name;
    document.getElementById('partnerReason').textContent = p.partner.reason;
  } else if (p.match_code) {
    const partner = findTypeByCode(p.match_code);
    if (partner) {
      document.getElementById('partnerEmoji').textContent = partner.emoji;
      document.getElementById('partnerName').textContent = partner.name + ' (' + partner.code + ')';
      document.getElementById('partnerReason').textContent = p.match_reason || '';
    }
  }

  // Dimension chart
  renderDimensionChart(levels);

  // Match ring animation
  showPage('page-result');
  setTimeout(() => {
    const ring = document.getElementById('matchRing');
    const circumference = 2 * Math.PI * 54;
    ring.style.strokeDashoffset = circumference - (circumference * matchPct / 100);
    animateNumber('matchNum', 0, matchPct, 1500);
  }, 300);

  // Setup share card
  setupShareCard(p, matchPct);
}

function animateNumber(elId, from, to, duration) {
  const el = document.getElementById(elId);
  const start = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(from + (to - from) * eased);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function renderDimensionChart(levels) {
  const groups = getDimensionGroups();
  const container = document.getElementById('dimensionChart');
  container.innerHTML = '';
  groups.forEach(g => {
    const div = document.createElement('div');
    div.className = 'dim-group';
    div.innerHTML = `<div class="dim-group-title"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${g.color}"></span>${g.name}</div>`;
    g.dims.forEach((d, i) => {
      const level = levels[d] || 'M';
      const pct = level === 'H' ? 90 : (level === 'M' ? 55 : 25);
      const lColor = level === 'H' ? '#00cec9' : (level === 'M' ? '#667eea' : '#a29bfe');
      div.innerHTML += `<div class="dim-row">
        <span class="dim-label">${g.labels[i]}</span>
        <div class="dim-bar-wrap"><div class="dim-bar" style="width:0%;background:${lColor}" data-target="${pct}"></div></div>
        <span class="dim-level" style="color:${lColor}">${level}</span>
      </div>`;
    });
    container.appendChild(div);
  });
  // Animate bars
  setTimeout(() => {
    container.querySelectorAll('.dim-bar').forEach(bar => {
      bar.style.width = bar.dataset.target + '%';
    });
  }, 200);
}

// ===== SHARE =====
function setupShareCard(p, matchPct) {
  const card = document.getElementById('shareCard');
  card.style.background = p.gradient ? `linear-gradient(160deg, ${p.gradient[0]}22 0%, #0a0a2e 40%, ${p.gradient[1]}22 100%)` : 'linear-gradient(160deg, #0a0a2e 0%, #1a1a4e 40%, #2a1a4e 100%)';
  document.getElementById('shareEmoji').textContent = p.emoji;
  document.getElementById('shareName').textContent = p.name;
  document.getElementById('shareName').style.color = p.gradient ? p.gradient[1] : '#f093fb';
  document.getElementById('shareCode').textContent = p.code;
  document.getElementById('shareSlogan').textContent = p.slogan || '';
  document.getElementById('shareMatch').innerHTML = `<span>${matchPct}</span><small>% 匹配</small>`;
  const tc = document.getElementById('shareTraits');
  tc.innerHTML = '';
  (p.strengths || []).forEach(t => { const s = document.createElement('span'); s.className='share-card-trait'; s.textContent=t; tc.appendChild(s); });
}

function generateShareCard() {
  const wrapper = document.getElementById('shareCardWrapper');
  wrapper.style.position='fixed';wrapper.style.top='0';wrapper.style.left='0';
  html2canvas(document.getElementById('shareCard'),{backgroundColor:'#0a0a2e',scale:2,useCORS:true,logging:false}).then(canvas => {
    wrapper.style.top='-9999px';wrapper.style.left='-9999px';
    const dataUrl = canvas.toDataURL('image/png');
    canvas.toBlob(blob => {
      if (navigator.share && navigator.canShare) {
        try {
          const file = new File([blob],'dream-result.png',{type:'image/png'});
          if (navigator.canShare({files:[file]})) {
            navigator.share({files:[file],title:'梦境人格测试结果'}).catch(() => showImagePreview(dataUrl));
            return;
          }
        } catch(e){}
      }
      if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const link = document.createElement('a');
        link.download='dream-personality.png';link.href=dataUrl;link.click();
        showToast('卡片已保存 ✨');
      } else {
        showImagePreview(dataUrl);
      }
    },'image/png');
  }).catch(() => { wrapper.style.top='-9999px';wrapper.style.left='-9999px'; showToast('生成失败，请重试'); });
}

function showImagePreview(dataUrl) {
  const ov = document.createElement('div');
  ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
  const tip = document.createElement('div');
  tip.style.cssText='color:#fff;font-size:16px;margin-bottom:16px;text-align:center';
  tip.textContent='📱 长按图片保存到相册';
  const img = document.createElement('img');
  img.src=dataUrl;
  img.style.cssText='max-width:90%;max-height:70vh;border-radius:12px;box-shadow:0 0 30px rgba(102,126,234,.5)';
  const cb = document.createElement('div');
  cb.style.cssText='color:#aaa;font-size:15px;margin-top:20px;padding:10px 30px;border:1px solid #555;border-radius:20px;cursor:pointer';
  cb.textContent='关闭';
  cb.onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.appendChild(tip);ov.appendChild(img);ov.appendChild(cb);
  document.body.appendChild(ov);
}

function restartQuiz() {
  currentQuestion=0;answers=[];dimScores={};isTransitioning=false;currentResult=null;currentMatchPct=0;
  // Reset match ring
  document.getElementById('matchRing').style.strokeDashoffset='339.292';
  document.getElementById('matchNum').textContent='0';
  showPage('page-welcome');
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  initStars();
  await loadData();
});
</script>
